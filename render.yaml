services:
  - type: web
    name: focus-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: focus-db
          property: connectionString
      - key: NODE_VERSION
        value: 22

databases:
  - name: focus-db
    plan: free
    databaseName: focus
    user: focus
